l_english:
  sp_event_SVO:0 "Start of the Special Military Operation"
  sp_event_SVO_QUOTE:0 "Do you want decommunization? Well, that suits us fine, but there's no need to stop halfway. We are ready to show you what real decommunization means for Ukraine. \n- §YVladimir Putin§!"
  sp_event_SVO_REMARK:0 "It has begun..."
  sp_event_march_justice_prigoshin:0 "Prigozhin's Mutiny"
  sp_event_march_justice_prigoshin_QUOTE:0 "There are 25,000 of us, and we are going to figure out why lawlessness reigns in the country. 25,000 are waiting as a tactical reserve, and the strategic reserve is the entire army and the entire country. \n- §YEvgeny Prigozhin§!"
  sp_event_march_justice_prigoshin_REMARK:0 "Russia descends into chaos"
  sp_event_bakhmut_taken_WGN:0 "The Fall of Bakhmut"
  sp_event_bakhmut_taken_WGN_QUOTE:0 "Only PMC 'Wagner' was here, there were no VDV or anyone else who could help us, as Konashenkov claimed. We helped ourselves. PMC 'Wagner' came to this war voluntarily and began to liberate territories, defending the interests of our homeland. \n- §YEvgeny Prigozhin§!"
  sp_event_bakhmut_taken_WGN_REMARK:0 "The fortress has fallen"
  sp_event_bakhmut_taken_RUS:0 "The Fall of Bakhmut"
  sp_event_bakhmut_taken_RUS_QUOTE:0 "But you have to understand that there is nothing left there, they destroyed everything. There are no buildings. I am very sorry about this. It's a tragedy. But today, Bakhmut remains only in our hearts. \n- §YVolodymyr Zelenskyy§!"
  sp_event_bakhmut_taken_RUS_REMARK:0 "The fortress has fallen"
  sp_event_WGN_prigozhin_President_Russia:0 "Prigozhin's Rule"
  sp_event_WGN_prigozhin_President_Russia_QUOTE:0 "And I send the same loud signal to everyone willing to hear it. I have very serious personal ambitions, excessive personal ambitions, to live in a country called Great Russia. \n- §YEvgeny Prigozhin§!"
  sp_event_WGN_prigozhin_President_Russia_REMARK:0 "New Russia"
  sp_event_WGN_prigozhin_died:0 "Death of Prigozhin"
  sp_event_WGN_prigozhin_died_QUOTE:0 "As the saying goes: it's better to die a hero than live as a faggot. Damn it, guys, just take me out already, that's all. What is destined cannot be avoided. \n- §YEvgeny Prigozhin§!"
  sp_event_WGN_prigozhin_died_REMARK:0 "Farewell, Zhenya"
  sp_event_RUS_particulation_mobilization:0 "Partial Mobilization in Russia"
  sp_event_RUS_particulation_mobilization_QUOTE:0 "Mobilization is war, and we conceive no other understanding of it. \n- §YBoris Shaposhnikov§!"
  sp_event_RUS_particulation_mobilization_REMARK:0 "The end of peaceful life"
  sp_event_BLR_Tikhonovskaya:0 "Tsikhanouskaya Comes to Power"
  sp_event_BLR_Tikhonovskaya_QUOTE:0 "I think that after such a colossal experience, I can be useful in building a new country together with Belarusians. I see myself working in the field of human rights protection. This is where my heart lies. \n- §YSvetlana Tsikhanouskaya§!"
  sp_event_BLR_Tikhonovskaya_REMARK:0 "The end of the regime"
  sp_event_RUS_retreat_from_Kiev:0 "Retreat of the Russian Armed Forces from near Kyiv"
  sp_event_RUS_retreat_from_Kiev_QUOTE:0 "The question is not about retreating, but about understanding that you have lost. \n- §YMaze Runner: The Death Cure (film)§!"
  sp_event_RUS_retreat_from_Kiev_REMARK:0 "Kyiv in 3 days..."
  sp_event_RUS_fall_Kiev_se:0 "The Fall of Kyiv"
  sp_event_RUS_fall_Kiev_se_QUOTE:0 "Kyiv is the Jerusalem of the Russian land. \n- §YAlexander II§!"
  sp_event_RUS_fall_Kiev_se_REMARK:0 "Ukraine is doomed"
  sp_event_WGN_fall_Kiev:0 "The Fall of Kyiv"
  sp_event_WGN_fall_Kiev_QUOTE:0 "For a long time, I evaded the blows of many opponents with one main goal - not to endanger these guys who are the foundation of Russian patriotism. \n- §YEvgeny Prigozhin§!"
  sp_event_WGN_fall_Kiev_REMARK:0 "Ukraine is doomed"
  sp_event_UKR_fall_Lugansk:0 "The Fall of Luhansk"
  sp_event_UKR_fall_Lugansk_QUOTE:0 "Everyone who was pro-Ukrainian has left. And those who want to receive two pensions - there and here - let them endure. I don't feel sorry for them at all. I feel sorry for the soldiers and officers with families who were killed there for these scumbags. \n- §YAndriy Reva§!"
  sp_event_UKR_fall_Lugansk_REMARK:0 "Russia is losing Donbas"
  sp_event_UKR_fall_Donetsk:0 "The Fall of Donetsk"
  sp_event_UKR_fall_Donetsk_QUOTE:0 "Sooner or later, we will still become part of our great Motherland. But it's one thing to enter in euphoria, another to go through such trials. \n- §YAlexander Zakharchenko§!"
  sp_event_UKR_fall_Donetsk_REMARK:0 "Turning point"
  sp_event_RDT_kiev:0 "Operational Breakthrough of the Ukrainian Border"
  sp_event_RDT_kiev_QUOTE:0 "In the minds of honest Russian people, the happiness of the Motherland cannot be acquired through its dismemberment. Only victory is the guarantor of independence for our country. \n- §YMikhail Alexeyev§!"
  sp_event_RDT_kiev_REMARK:0 "Is the end of the war approaching?"
  # Note: The following two keys/values seem potentially duplicated or incorrectly formatted in the source,
  # but they are translated according to the request.
  sp_event_RDT_kiev: "Operational Breakthrough of the Ukrainian Border"
  sp_event_RDT_kiev_REMARK: "Operational Breakthrough of the Ukrainian Border"