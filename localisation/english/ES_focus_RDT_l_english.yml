#Redut Non-Historical
RDT_razvedka: "Integration with GLONASS"
Kubinka: "Emergency meeting outside the Kremlin walls"
Kubinka_desc: "Today, at four in the morning Moscow time, Vladimir Alekseev woke up to a sudden call. The call came on his work phone. The sleepy Lieutenant General mechanically answered the unexpected call.\n\"Vladimir Alekseev?...\" - a nervous and trembling voice almost whispered a few words. The unknown person continued without waiting for an answer. \"Vladimir Alekseev, the Chief of Staff summons you urgently. Emergency meeting, be ready within an hour.\" \nVladimir Alekseev would remember this meeting for the rest of his life."
borderRDT: "§RVanguard in the Chernobyl Exclusion Zone§!"
borderRDT_desc: "Our DRGs (Sabotage and Reconnaissance Groups) entered the Chernobyl Exclusion Zone even before the start of the special military operation to conduct reconnaissance of the area. Disabling a couple of cameras along the way, we carefully advance through the forests of the Kyiv region, and also clear mines in the nearest areas. I wonder if any of them will notice the disappearance of hundreds of TM-62 mines?"
RDT_CHVK: "PMC 'Redut'"
RDT_CHVK_desc: "The history of our private military company is shrouded in darkness, a fog of oblivion. Only you, Vladimir Alekseev, know all the hardships and intricacies of our work. But such casual, everyday days were interrupted by a report from the Kremlin... "
RDT_KUBINKA: "Emergency meeting in the Kremlin"
RDT_XP: "Analysis of previous years"
RDT_XP_desc: "All our personnel are battle-hardened fighters, from privates to generals. Each soldier has their own individual experience, which undoubtedly helps in current conflicts. The trenches of the Chechen campaign, combined arms operations in Georgia, counter-terrorist struggle in the Caucasus, equipping strongpoints in Afghanistan, UAVs in the Syrian campaign - all this helps us right now. Combat experience in difficult terrain is our trump card compared to regular troops."
RDT_GRU: "The direct hand of the GRU"
RDT_GRU_desc: "The GRU is directly involved in our military system, especially at the strategic and tactical intelligence levels. The GLONASS system is part of our network-centric doctrine; it ensures seamless coordination between our units. All of the above gives us the ability to respond quickly and timely to extraordinary situations. "
RDT_WALK: "Keeping pace with the times"
RDT_WALK_desc: "We should not forget that the experience of past conflicts is the foundation for future development. We should use all opportunities to increase our combat effectiveness. This is what will give us an advantage over regular military units: UAVs, new communication means, widespread use of GLONASS."
RDT_COMMANDERS: "Deep night in Kubinka"
RDT_COMMANDERS_desc: "Uncertainty hangs over our command, clearly manifested in the disparity of the upcoming operation. We need to reach some conclusions, otherwise we will be doomed to perish."
RDT_WAR_READY: "Introduction of combat readiness"
RDT_WAR_READY_desc: "The X moment has arrived, when the state needs us more than ever. Combat alert will raise all units, including the servicemen of the 45th brigade, to perform primary tasks."
RDT_MO_ARSENAL: "MoD Arsenals"
RDT_MO_ARSENAL_desc: "Our autonomy within the MoD RF has its advantages: access to state military warehouses. Our friends in the logistics support of the RF Armed Forces are ready to provide us with everything necessary for the further operation. The quality of equipment will certainly vary, but, in any case, it's better than nothing."
RDT_BARS: "Direct inspections in BARS"
RDT_BARS_desc: "Combat Army Reserve of the Country (BARS) - reservists who were actively recruited back in 2021. Currently, BARS members are completely inexperienced and 'green'. So, we received a unique offer: to directly supervise two battalions, as well as inspect the current BARS units within the MoD RF. It's impossible to refuse such an opportunity; we will definitely expand the staff of our 'employees'."
RDT_SMO: "Develop an offensive plan"
RDT_SMO_desc: "Our troops are already in their starting positions; we are fully ready for combat contact. All that remains is to choose the direction of our main offensive to begin preparatory measures. And then, within a few hours after the start of the operation, we will breach the defenses of the AFU (Armed Forces of Ukraine). Together with the RF Armed Forces, we will inflict such fire damage on the enemy's first echelon that they will not be able to recover from the blow anytime soon. Their fate is to pray for future mercy. Let's work, brothers!"
RDT_START_SMO: "Start of the SMO"
RDT_START_SMO_desc: "The Special Military Operation has begun. There is no turning back. Our task is to fulfill all the goals set by our supreme commander-in-chief. The Motherland calls."
RDT_STARTKUBINKA: "Council of 'Redut' Commanders"
RDT_STARTKUBINKA_desc: "Our unique structure has become the basis for the successful activity of the PMC in various directions. We just need to gather a round table where all the commanders of our company will participate. A sober look at our work is the basis for future victories. Each commander knows his job, which undoubtedly helps in solving logistical, sabotage, assault, and other tasks."
RDT_WIN: "Successful start"
RDT_WIN_desc: "All the goals set before us have been achieved. The state was not mistaken in betting on us. Now 'Redut' is the most influential PMC in Russia. We just need to consolidate the result and strive for new victories."
RDT_KUBINKA3: "New meeting in the General Staff"
RDT_KUBINKA3_desc: "..."
RDT_MEDIA_PROJECT: "Direct advertising from VGTRK"
RDT_MEDIA_PROJECT_desc: "After brief negotiations, we agreed with Oleg Dobrodeev on a large-scale advertising campaign on VGTRK. Our PMC will become an example of the collective image of the 'victory' marshal, in the form of Vladimir Alekseev. He will constantly appear on the front lines and make provocative statements to the Ukrainian side. What's there to say, when our fighters are the vanguard of all assault operations. Russian society, through word of mouth, characterizes them as: 'heroes of Russia'."
RDT_GREATESCHVK: "Expropriation of Private Military Organizations"
RDT_GREATESCHVK_desc: "The Russian government has given us carte blanche for all actions, which completely turned the game with Prigozhin around. Now we are the leaders who must take 'RSB-Group' under our wing, along with investments from interested Russian companies. All these organizations and subsidies will become an integral part of our mechanism, which will improve the organization of joint actions. On the remnants of past micro-PMCs, we will create new units, allowing new fighters to adopt past experience."
RDT_GOSDUMA: "Push through the law 'On PMCs'"
RDT_GOSDUMA_desc: "Vyacheslav Volodin, together with United Russia, will push through the law 'On Private Military Companies'. The basis of this law will be the 2015 draft, which was never adopted. The FSB will fully handle the issue of legalizing PMCs within Russia, which will undoubtedly strengthen our position."
RDT_NEW_DONATION: "Increase in subsidies"
RDT_NEW_DONATION_desc: "Our successes have guaranteed new subsidies from the state, which we receive through Voentorg companies."
RDT_SIC: "RDC Unit"
RDT_SIC_desc: "Victory in war is victory in technology. Without new equipment, without UAVs, without EW (Electronic Warfare) and other advanced technologies, we will not win. For network-centric warfare, we must implement all necessary innovations."
RDT_RUSSIAN_SPETS: "'I am Russian Spetsnaz, I don't give a damn about anything..'"
RDT_RUSSIAN_SPETS_desc: "..."
RDT_BIL_RECRUIT: "Billboards across the country"
RDT_BIL_RECRUIT_desc: "The symbols of our PMC will be displayed everywhere to actively remind people of our activities."
RDT_WITH_AK:  "'With an assault rifle in my hands, I go to kill..'"
RDT_WITH_AK_desc: "..."
RDT_WGN_QUET: "Putting an end to the 'orchestra' question"
RDT_WGN_QUET_desc: "The moment has come when we must finally define our position regarding Yevgeny Viktorovich (Prigozhin)."
RDT_WITH_MO: "Side with the MoD RF"
RDT_WITH_MO_desc: "The time has come to finish off the oligarch who decided to oppose our government. We will undoubtedly support the MoD RF to hammer the nail into the coffin of the criminal"
RDT_DRG_IN_WGN: "Sabotage in the warehouses of the 'Wagner' group"
RDT_DRG_IN_WGN_desc: "Sabotage is the most effective method of counteraction. In the coming month, the Wagners will have no successes. Nor some equipment."
RDT_WGN_SOLDIERS: "Transfer to 'Redut' - your alternative"
RDT_WGN_SOLDIERS_desc: "We are ready to offer the Wagners better contract terms than Prigozhin himself. Our advantage is full legalization, the possibility of obtaining combat veteran status, payments from the state, as well as from our company. Many mercenaries work for money, not for an idea. So how are we worse, if we are ready to guarantee a higher salary and all necessary payments?"
RDT_NEUTRAL: "True neutrality"
RDT_NEUTRAL_desc: "We should not participate in the squabbles of two dogs trying to bite each other to death. We need to act as an arbiter and gather all necessary evidence indicating the existence of the conflict. Objectivity will allow us to take a necessary but serious step forward for the victory of our Motherland."
RDT_CALL_PUTIN: "Personal call to Putin"
RDT_CALL_PUTIN_desc: "Vladimir Alekseev called Putin on his personal phone to report on the situation between the MoD and PMC 'Wagner'. We are ready to provide all necessary evidence to the president."
RDT_WITH_WGN: "Side with PMC 'Wagner'"
RDT_WITH_WGN_desc: "It is obvious that the MoD RF is trying to isolate the Wagners from ammunition (BK). This is all happening because of the personal conflict between Shoigu and Prigozhin. While we might be ready for concessions to the MoD RF, the orchestra is used to acting differently. The departure of Surovikin and the arrival of Gerasimov finally broke the mechanism of cooperation between these structures. We will start helping the musicians only to bring victory in Ukraine closer, and also to prevent excessive influence of the MoD RF in the future."
RDT_BK_FOR_WGN: "Provide some ammunition (BK)"
RDT_BK_FOR_WGN_desc: "Mizintsev was guided by the right ideas when he provided the 'Wagner' group with part of the ammunition supply. After all, the main thing is Russia's victory, and only then personal interests. Every day the sons of Russia die, every day zinc coffins ('tsink') travel from the SMO zone to the mainland. Is it really acceptable to use ammunition supply for personal gain?"
#Ukraine Branch
RDT_DRG_21: "21st Century DRGs"
RDT_DRG_21_desc: "The manuals of the USSR MoD and the GRU from the 1990s are significantly outdated, especially for the war in Ukraine. Drones, aerospace reconnaissance, and the broad integration of the AFU and NATO have led us to improve our fundamental doctrine. Now, sabotage and reconnaissance operations are adapted to the realities of the new era, allowing us to deliver unexpected strikes against the enemy. In conjunction with leading minds, we are refining the well-established mechanism of sabotage."
RDT_RESERVS: "Gather reserves"
RDT_RESERVS_desc: "Our next task is to organize a breakthrough of the AFU's border points. Without the necessary reserves, we will not be able to build on our further success. Unfortunately, we cannot always rely on the MoD RF, so we will have to take this initiative into our own hands."
RDT_AVANTURE: "An epochal gamble"
RDT_AVANTURE_desc: "We must choose the direction of our attack, after which our headquarters will begin planning a strategic operation to breach the Ukrainian border. Our task is to transition from sabotage and reconnaissance penetrations to operational infantry, and then tactical offensive in the border area. The ultimate goal is a strategic breakthrough of the border, which will not only create a buffer zone for Russia but also bring the end of the SMO closer."
RDT_UKR_BORDERS: "Breach the border"
RDT_UKR_BORDERS_desc: "The moment of truth has arrived, which may change the situation on the front. All that remains is to give the order, Comrade Alekseev. "
RDT_PRETORIAN: "Praetorian Guard of Russia"
RDT_PRETORIAN_desc: "Having traversed a long and thorny path, we have become the elite of the Russian forces. For us, it is a duty and honor: to be the heroes of our country."