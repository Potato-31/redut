RDT_STROMZ: "Supervision of territorial defense"
RDT_STROMZ_desc: "Supervising territorial defense is a necessity to save Russia's honor from disgrace"
RDT_KUBINKA2: "The beginning of the end?..."
RDT_WGN_SHADOW: "We are the shadow of the Wagners"
RDT_LOS_DONATION: "Excessive reduction of subsidies"
