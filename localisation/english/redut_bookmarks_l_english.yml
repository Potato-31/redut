 RDT_EAST_SHOWDOWN_DESC: "PMCs Redut is one of the oldest private military companies, which dates back to 2003. It is worth noting that at the dawn of the 00s, the interests of Russian companies were protected by poorly organized PMCs. The disorganization put an end to the GRU, which certainly participated in the creation of a single company to protect private interests. The initiator of the PMCs was the first Deputy head of the GRU General Staff of the Armed Forces of the Russian Federation: Vladimir Alekseev. We can say that he then "occupied" the place of Dmitry Utkin, while Anatoly Karazy was "Prigozhin", who was engaged in the external economic and political course of the PMCs. Having traveled from Yugoslavia to Syria, the PMC took part in the SVR to help its fatherland in the fight against neo-Nazism."
