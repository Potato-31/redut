 RDT_EAST_SHOWDOWN_2022_01_01_DESC: "PMC 'Redut' is one of the oldest private military companies, tracing its origins back to 2003. It is worth noting that in the early 2000s, the interests of Russian companies were protected by poorly organized private military detachments. This disorganization was put to an end by the GRU, which invariably participated in the creation of a unified company for the protection of private interests. The initiator of the PMC was the First Deputy Chief of the GRU of the General Staff of the Armed Forces of the Russian Federation: Vladimir Alekseev. It could be said that he subsequently 'took on' the role of Dmitry Utkin, while the 'Prigozhin' figure was Anatoly Karaziy, who handled the PMC's foreign economic and political course. Having traveled the path from Yugoslavia to Syria, the PMC took part in the Special Military Operation to help its fatherland in the fight against neo-Nazism."
 RDT_EAST_SHOWDOWN_2022_04_15_DESC: "'Redut' shifted its operational profile from distant foreign lands to its immediate neighbor — Ukraine. The routine support of disorganized private military detachments was replaced by direct participation in the special military operation under the banner of the GRU. By the spring of 2022, units of the Ministry of Defense of the Russian Federation began to utilize the personnel rotation system established by 'Vladimir Alekseev's company.' However, it is worth noting that this structure was in a state of limbo. Coordination between 'Redut' units and the Russian Ministry of Defense was very weak, which significantly increased the risk of friendly fire and also inflicted irreparable losses on this PMC during the initial stage. The structure and goals of 'Redut' are unknown. A completely different PMC is emerging from the shadows — 'Wagner.' This highly specialized company was redeployed to the Popasna area, where, with a sudden strike, it liberated the populated locality of Novoaleksandrovka and also advanced to the outskirts of Popasna itself. Although the fate of the 'Wagner' offensive remains unknown, one thing is constant: the fate of PMC 'Redut' directly depends on the successes of its potential competitor."