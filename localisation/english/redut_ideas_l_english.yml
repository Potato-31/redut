l_english:
#Redut
 RDT_maneuvers: "Strategic Maneuvers"
 RDT_DRG21: "Sabotage and Reconnaissance Autarky"
 RDT_DRG21_desc: "Our operations behind enemy lines have reached a level of professionalism unprecedented in human history. Combined with the latest technologies, we demonstrate incomparable results. Our crusade in the rear is merely the foundation for future actions. The forests of Malorossiya guide us on the righteous path, as do our 'little birds'. We hide in the night, in the foggy days of existence. Redut members are everywhere, look around..."
 RDT_manpower_1: "Fictitious MoD Contracts"
 RDT_manpower_1_desc: "Our contracts are so unique that we are not part of the Russian Federation's MoD. Every contract signed with us is a contract with some organization that bears no responsibility for the 'employee's' injuries or damages. Our payments are based solely on our word and authority. For many, we are a mechanism to bypass the bureaucratic hell of the main MoD structure. But it's not like we are better in every aspect..."
 RDT_manpower_2: "Closed MoD Contracts"
 RDT_manpower_2_desc: "Our contracts are so unique that we are not part of the Russian Federation's MoD. Every contract signed with us is a contract with some organization that bears no responsibility for the 'employee's' injuries or damages. However, our payments are based on classified contract terms. The contract terms are a military secret, closely guarded by the ZGT service of the RF Armed Forces. This is certainly better than the previous situation. But we still lack any clear legal validity to this day."
 RDT_manpower_3: "Unique Contracts of a Legalized PMC"
 RDT_manpower_3_desc: "Our contracts are so unique that we are not part of the Russian Federation's MoD. Every contract signed with us is a contract with the official 'Redut' organization. A fighter is guaranteed to receive not only our payments but also payments from the RF Armed Forces. The 'Company' guarantees a combat veteran certificate to every 'employee', as well as extensive psychological and social support in the future."
 RDT_Alekseev: "Vladimir Alekseev"
 RDT_council_idea: "Plenum of PMC 'Redut'"
 RDT_council_idea_desc: "Our council of commanders is a unique system, devoid of army bureaucracy. This allows us to quickly adapt to extraordinary situations."
 RDT_attack: "Initiative of Junior and Middle Ranks"
 RDT_attack_shock: "Initiative of Junior and Middle Ranks with Emphasis on Breakthrough Strikes"
 RDT_attack_with_defense: "Initiative of Junior and Middle Ranks with Emphasis on Static Defense"
 RDT_attack_planning: "Initiative of Junior and Middle Ranks with Emphasis on Comprehensive Planning"
 RDT_attack_desc: "In our PMC, there is no saying 'initiative fucks the initiator'; we consider all initiatives from junior and middle ranks for successful operations."
 RDT_SYR_resources: "Gennady Timchenko's Syrian Assets"
 RDT_SYR_resources_desc: "Gennady Timchenko helps his people..."
 RDT_SYR_resources_2: "Gennady Timchenko's International Assets"
 RDT_SYR_resources_2_desc: "Does anyone even read this bullshit? If you read this, message me and I'll send you tits. Offer valid for one person only. Discord: potato31_"
 RDT_our_xp: "Experience of Past Years"
 RDT_our_xp_desc: "Experience from past conflicts has given us battle-hardened personnel who are never afraid to engage in combat. But this is not enough to become the best of the best. Only progress synergizes our successes."
 RDT_our_xp_2: "Experience of Past Years with 21st Century Specifics"
 RDT_our_xp_2_desc: "The 21st century has introduced many adjustments to our PMC, which has undoubtedly improved our coordination in the realities of modern warfare. Combat cohesion training is conducted by those who have actually participated in hostilities and are ready to keep pace with the times. This very approach guarantees future stability and indispensability."
 RDT_own_structure: "Unique and Autonomous Structure"
 RDT_own_structure_desc: "Our structure is unique in its kind. On one hand, we are closely associated with the GRU; on the other hand, we are a private military company with our own leadership and tasks. This is what distinguishes us from Wagner and the RF MoD."
 RDT_own_structure_2: "Unique and Autonomous Structure"
 RDT_own_structure_2_desc: "Our structure is unique in its kind. On one hand, we are closely associated with the GRU; on the other hand, we are a private military company with our own leadership and tasks. This is what distinguishes us from Wagner and the RF MoD."
 RDT_PIZDA: "Complete Disorganization of Communication Means"
 RDT_PIZDA_desc: "With the start of the SMO, our communication systems couldn't handle the load caused by the rapid advance of Russian combined arms formations (not to mention the struggle against Ukrainian EW). Satellite communication stations, portable radios, and unified communication systems complexes were replaced by TA-88, and later TA-57. 'Tapiks' were a necessary measure until things improved."
 RDT_best_idea: "Praetorian Guard of Russia"
 WGN_REDUT_LOLKEK: "Consequences of Sabotage at Our Warehouses"
 RDT_girkin_deck: "Structure Reorganization"
 RDT_girkin_deck2: "Consequences of Reforms"
 #Standard Ideas