l_russian:
#Редут
 RDT_maneuvers: "Стратегические маневры"
 RDT_DRG21: "Диверсионно-разведывательная автаркия"
 RDT_DRG21_desc: "Наши операции в тылу противника достигли такой степени профессионализма, которой еще не знает история человечества. В связке с новейшими технологиями мы показываем несоизмеримый результат деятельности. Наш крестовый поход в тылу - лишь основа для будущих действий. Леса Малороссии направляют нас в праведном пути, как и наши «птички». Мы скрываемся в ночи, в туманных днях бытия. Редутовцы находятся везде, оглядывайтесь..."
 RDT_manpower_1: "Фиктивные контракты МО"
 RDT_manpower_1_desc: "Наши контракты настолько уникальны, что мы не являемся частью МО РФ. Каждый заключённый контракт с нами - контракт с некой организацией, что вовсе не должна нести ответсвенность за ранения и ущербы «сотрудника». Наши выплаты держатся только на нашем слове и авторитете. Для многих мы механизм, что помогает обойти бюрократический ад основной структуры МО. Но не сказать, что мы лучше во всем..."
 RDT_manpower_2: "Закрытые контракты МО"
 RDT_manpower_2_desc: "Наши контракты настолько уникальны, что мы не являемся частью МО РФ. Каждый заключённый контракт с нами - контракт с некой организацией, что вовсе не должна нести ответсвенность за ранения и ущербы «сотрудника». Однако, наши выплаты держатся на закрытых контрактных условиях. Условия контракта - военная тайна, за которой пристально бдит служба ЗГТ ВС РФ. Это всяко лучше, чем положение ранее. Но какой-то четкой юридической действительности мы не имеем по сей день."
 RDT_manpower_3: "Уникальные контракты легализированной ЧВК"
 RDT_manpower_3_desc: "Наши контракты настолько уникальны, что мы не являемся частью МО РФ. Каждый заключённый контракт с нами - контракт с официальной организацией «Редут». Боец может не только гарантированно получить наши выплаты, но также и от ВС РФ. «Компания» гарантирует удостоверение ветерана боевых действий каждому «сотруднику», а также широкую психологическую и социальную помощь в будущем."
 RDT_Alekseev: "Владимир Алексеев"
 RDT_council_idea: "Пленум ЧВК «Редут»"
 RDT_council_idea_desc: "Наш совет командиров - уникальная система, лишенная армейского бюрократизма. Это позволяет нам быстро адаптироваться к неординарым ситуациям."
 RDT_attack: "Иннициатива младшего и среднего звена"
 RDT_attack_shock: "Иннициатива младшего и среднего звена с упором на проламывающие удары"
 RDT_attack_with_defense: "Иннициатива младшего и среднего звена с упором на статическую оборону"
 RDT_attack_planning: "Иннициатива младшего и среднего звена с упором на всеобщее планирование"
 RDT_attack_desc: "В нашем ЧВК нет поговорки «иннициатива ебёт иннициатора», мы учитываем все начинания младшего и среднего звена для успешной работы."
 RDT_SYR_resources: "Сирийские активы Геннадия Тимченко"
 RDT_SYR_resources_desc: "Геннадий Тимченко помогает своим людям..."
 RDT_SYR_resources_2: "Международные активы Геннадия Тимченко"
 RDT_SYR_resources_2_desc: "Кто-то вообще читает эту хуйню? Если вы прочитали это, то напишите мне и я вам скину сиськи. Акция работает только для одного человека. Дискорд: potato31_"
 RDT_our_xp: "Опыт прошлых лет"
 RDT_our_xp_desc: "Опыт прошлый конфликтов дал нам обстреленный личный состав, что никогда не боится вступать в бой. Но этого не достаточно, чтобы стать лучшими из лучших. Только прогресс синергирует наши успехи."
 RDT_our_xp_2: "Опыт прошлых лет со спецификой 21-ого века"
 RDT_our_xp_2_desc: "21-ый век внес множество корректив в нашу ЧВК, что, несомненно, улучшило нашу координацию в реалиях новых войн. Боевое слаживание проводят те, кто действительно участвовал в боевых действиях и готов идти в ногу со временем. Именно этот подход и гарантирует будущую стабильность и незаменимость."
 RDT_own_structure: "Уникальная и автономная структура"
 RDT_own_structure_desc: "Наша структура уникальная в своем роде. С одной стороны мы - близкие люди к ГРУ, с другой мы - частная военная компания, со своим руководством и со своими задачами. Именно это нас отличает от Вагнеров и МО РФ."
 RDT_own_structure_2: "Уникальная и автономная структура"
 RDT_own_structure_2_desc: "Наша структура уникальная в своем роде. С одной стороны мы - близкие люди к ГРУ, с другой мы - частная военная компания, со своим руководством и со своими задачами. Именно это нас отличает от Вагнеров и МО РФ."
 RDT_PIZDA: "Полная дезорганизация средств связи"
 RDT_PIZDA_desc: "С началом СВО наши средства связи не справлялись с нагрузкой, вызваннной стремительным продвижением российских общевойсковых соединений (о борьбе с украинской РЭБ вообще стоит умолчать). Станции спутниковой связи, портативные радиостаниции, комплексы унифицированных средств связи были сменены ТА-88, а позже и на ТА-57. Тапики были вынужденной мерой, пока все не наладится."
 RDT_best_idea: "Преторианская гвардия России"
 WGN_REDUT_LOLKEK: "Последствия диверсии на наших складах"
 RDT_girkin_deck: "Реорганизация структуры"
 RDT_girkin_deck2: "Последствия реформ"
