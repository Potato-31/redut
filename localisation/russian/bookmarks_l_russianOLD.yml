 RDT_EAST_SHOWDOWN_2022_01_01_DESC: "ЧВК «Редут» - одна из самых древнейших частных военных компаний, которая берет свое начало еще в 2003-ем году. Стоит отметить, что на заре 00-х, интересы российских компаний защищались слабо организованными ЧВОК. Дезорганизации положило конец ГРУ, которое неприменно участвовало в создании единой компании защиты частных интересов. Инициатором ЧВК стал первый заместитель начальника ГРУ ГШ ВС РФ: Владимир Алексеев. Можно сказать, что далее он «занимал» место Дмитрия Уткина, «Пригожиным» же был Анатолий Каразий, который и занимался внешним эконом-политическим курсом ЧВК. Пройдя путь от Югославии до Сирии, ЧВК приняло участие в СВО, чтобы помочь своему отечеству в борьбе с неонацизмом."
 RDT_EAST_SHOWDOWN_2022_04_15_DESC: "«Редут» сменил профиль операций с дальнего зарубежья на ближайшего соседа — Украину. Рутинное обеспечение дезорганизованных ЧВОК сменилось прямым участием в специальной военной операции под знаменами ГРУ. К весне 2022 года подразделения Министерства обороны Российской Федерации начали использовать систему ротации кадров, установленную «компанией Владимира Алексеева». Однако стоит отметить, что данная структура находилась в подвешенном состоянии. Координация между подразделениями «Редута» и МО РФ была очень слабой, что значительно повысило риск дружественного огня, а также нанесло непоправимые потери данной ЧВК на первом этапе. Структура и цели «Редута» - неизвестны. Из тени выходит совсем иная ЧВК - «Вагнер». Данная узкоспециализированная компания была переброшена под Попасную, где внезапным ударом освободила населенный пункт Новоалександровка, а также продвинулась на окраинах самой Попасной. Хотя судьба «вагнеровского» наступления остается неизвестной, одно неизменно: судьба ЧВК «Редут» напрямую зависит от успехов своего потенциального конкурента."