#редут_анхист
RDT_razvedka: "Интеграция с ГЛОНАСС"
Kubinka: "Экстренное заседание за стенами Кремля"
Kubinka_desc: "Сегодня, в четыре утра по московскому времени, Владимир Алексеев проснулся от внезапного звонка. Звонок пришелся на рабочий телефон. Сонный генерал-лейтенант машинально ответил на непредвиденный вызов.\n\«Владимир Алексеев?..» - нервный и дрожащий голос чуть-ли не прошептал пару слов. Неизвестный продолжил не дожидаясь ответа. «Владимир Алексеев, вас срочно вызывает начальник штаба. Экстренное заседание, готовность в течение часа». \n\Данное заседание Владимир Алексеев будет помнить всю оставшуюся жизнь."
borderRDT: "§RАвангард в Чернобыльской Зоне Отчуждения§!"
borderRDT_desc: "Наши ДРГ зашли в Чернобыльскую Зону Отчуждения ещё до начала специальной военной операции, чтобы провести рекогносцировку местности. Отключив пару камер по пути, мы осторожно продвигаемся по лесным массивам киевской области, а также разминируем ближайшие участки. Интересно, кто-то из них заметит пропажу сотен ТМ-62?"
RDT_CHVK: "ЧВК «Редут»" 
RDT_CHVK_desc: "История нашей частной военной компании покрыта мраком, туманом небытия. Только вы, Владимир Алексеев, знаете все тяготы и тонкости нашей работы. Но столь непринужденные, бытовые дни прервались докладом из Кремля... "
RDT_KUBINKA: "Экстренное заседание в Кремле"
RDT_XP: "Анализ предыдущих лет"
RDT_XP_desc: "Весь наш личный состав - обстреленные бойцы, от рядовых до генералов. У каждого военного свой индивидуальный опыт, что несомненно помогает в нынешних конфликтах. Окопы чеченской компании, общевойсковые операции в Грузии, контртеррорестическая борьба на Кавказе, оборудование опорных пунктов в Афгане, БПЛА в сирийской компании - все это помогает нам прямо сейчас. Опыт боев в сложных местностях - наша козырная карта, по сравнению с обычными войсками."
RDT_GRU: "Прямая рука ГРУ"
RDT_GRU_desc: "ГРУ прямо участвует в нашей военной системе, особенно на уровнях стратегической и тактической разведки. Система ГЛОНАСС является частью нашей сетецетентрической доктрины, именно она обеспечивает бесперебойную координацию между нашими частями. Все выше перечисленное дает нам возможность быстрого, своевременного реагирования на неординарные ситуации. "
RDT_WALK: "Идти в ногу со временем"
RDT_WALK_desc: "Не стоит забывать, что опыт прошлых конфликтов - основа, для будущего развития. Нам стоит использовать все возможности, чтобы увеличить нашу боевую эффективность. Именно это даст нам преимущество над обычными войсковыми частями: БПЛА, новые средства связи, широкое использование ГЛОНАСС."
RDT_COMMANDERS: "Глубокая ночь в Кубинке"
RDT_COMMANDERS_desc: "Пред нашим командованием ветает неопределенность, что явно проявляется в несоизмеримости предстоящей операции. Надо приходить к каким-то выводам, иначе мы будем обречены на гибель."
RDT_WAR_READY: "Введение боевой готовности"
RDT_WAR_READY_desc: "Настал момент X, когда мы как никогда нужны государству. Боевая тревога поднимет все подразделения, в том числе и военнослужащих 45-ой бригады, для выполнения первостепенных задач."
RDT_MO_ARSENAL: "Арсеналы МО"
RDT_MO_ARSENAL_desc: "Наша автономия в рамках МО РФ имеет свои плюсы: доступ к военным складам государства. Наши друзья в материальном-техническом обеспечении ВС РФ готовы обеспечить нас всем необходимым для дальнейшей операции. Качество снаряжения конечно будет варьироваться, но, в любом случае, это лучше, чем ничего."
RDT_BARS: "Прямые инспекции в БАРС"
RDT_BARS_desc: "Боевой Армейский Резерв Страны (БАРС) - резервисты, что активно набирались еще в 2021-ом году. На данный момент члены БАРСа вовсе необстрелянны и «зелены». Так вот, нам поступило уникальное предложение: курировать два батальона напрямую, а также инспектировать нынешние подразделения БАРСа в составе МО РФ. От такой возможности невозможно отказаться, мы определенно расширим штат наших «сотрудников»."
RDT_SMO: "Разработать план наступления"
RDT_SMO_desc: "Наши войска уже находятся на исходных позициях, мы полностью готовы к боевому контакту. Остается только выбрать направление нашего основного наступления, чтобы начать подготовительные мероприятия. А после, в течение нескольких часов после начала операции, мы пробьем брешь в обороне ВСУ. Совместно с ВС РФ мы нанесем такое огневое поражение первому эшелону противника, что тот не сможет в ближайшее время оклиматься от удара. Их участь - молиться о будущей пощаде. Работаем, братья!"
RDT_START_SMO: "Начало СВО"
RDT_START_SMO_desc: "Специальная Военная Операция началась. Пути назад уже не будет. Наша задача - выполнение всех целей, поставленных нашим верховным главнокомандующим. Родина зовет."
RDT_STARTKUBINKA: "Совет командиров «Редута»"
RDT_STARTKUBINKA_desc: "Наша уникальная структура стала основой успешной деятельности ЧВК на разных направлениях. Нам остается собрать круглый стол, где будут участвовать все командиры нашей компании. Трезвый взгляд на нашу работу - основа для будущих побед. Каждый командир знает свою работу, что, несомненно, помогает в решении материально-технических, диверсионных, штурмовых и иных задач."
RDT_WIN: "Успешное начало"
RDT_WIN_desc: "Все поставленные цели перед нами были выполнены. Государство не ошиблось в том, что сделало ставку на нас. Теперь «Редут» - самое влиятельное ЧВК в России. Нам остается закрепить результат и добиваться новых побед."
RDT_KUBINKA3: "Новое заседание в генеральном штабе"
RDT_KUBINKA3_desc: "Мы стали частью российского военного механизма. Теперь мы будем передавать свой опыт в структуры МО. Наша структура стремительно развивается, а наш состав - один из лучших на данной войне. Государство признало исключительно нас, а не ЧВК «Вагнер». Это уже говорит о многом."
RDT_MEDIA_PROJECT: "Прямая реклама от ВГТРК"
RDT_MEDIA_PROJECT_desc: "После непродолжительных переговоров, мы договорились с Олегом Добродеевым о масштабной компании рекламы в ВГТРК. Наше ЧВК станет примером собирательного образа маршала «победы», в виде Владимира Алексеева. Он постоянно будет светиться на фронте, а также делать провокационные заявления украинской стороне. Чего тут говорить, когда наши бойцы - авангард всех штурмовых операций. Российское общество сарафанным радио характеризует их как: «героев России»."
RDT_GREATESCHVK: "Экспроприцация ЧВОК"
RDT_GREATESCHVK_desc: "Российское правительство дало нам карт-бланш на все действия, что полностью перевернуло игру с Пригожиным. Теперь мы - лидеры, которые должны взять под свое крыло «РСБ-Групп», инвестиции от заинтересованных российских компаний. Все эти организации и дотации станут неотложеннной частью нашего механизма, что повысит организацию совместных действий. На остатках прошлых микро-ЧВК мы создадим новые подразделения, что позволит новым бойцам перенять прошлый опыт." 
RDT_GOSDUMA: "Продавить закон «О ЧВК»"
RDT_GOSDUMA_desc: "Вячеслав Володин совместно с Единой Россией продавит закон «О Частных Военных Компаниях». Основой этого закона будет проект 2015-ого года, который так и не был принят. ФСБ полностью займется вопросом легализации ЧВК на территории России, что несомненно укрепит наши позиции."
RDT_NEW_DONATION: "Увеличение дотаций"
RDT_NEW_DONATION_desc: "Наши успехи гарантировали новые дотации от государства, которые мы получаем через компании военторга."
RDT_SIC: "Подразделение НИЦ"
RDT_SIC_desc: "Победа в войне - победа в технологиях. Без нового снаряжения, без БПЛА, без РЭБ и иных авангардных технологий мы не победим. Для сетецентричной войны мы должны внедрять все необходимые инновации."
RDT_RUSSIAN_SPETS: "«Я - российский спецназ, мне на все наплевать..»"
RDT_RUSSIAN_SPETS_desc: "..."
RDT_BIL_RECRUIT: "Билборды по всей стране"
RDT_BIL_RECRUIT_desc: "Символика нашей ЧВК будет красоваться везде, чтобы активно напоминать о нашей деятельтности."
RDT_WITH_AK:  "«С автоматом в руках я иду убивать..»"
RDT_WITH_AK_desc: "..."
RDT_WGN_QUET: "Точка в вопросе «оркестра»"
RDT_WGN_QUET_desc: "Настал момент, когда мы окончательно должны обозначить нашу позицию по Евгению Викторовичу."
RDT_WITH_MO: "Встать на сторону МО РФ"
RDT_WITH_MO_desc: "Пришло время добить олигарха, который решил выступить против нашего правительства. Мы неприменно окажем поддержку МО РФ, чтобы забить гвоздь в крышку гроба уголовника"
RDT_DRG_IN_WGN: "Диверсии в складах группы «Вагнера»"
RDT_DRG_IN_WGN_desc: "Саботаж - самый эффективный способ противодействия. В ближайший месяц у вагнеров не будет успехов. Как и некоторого снаряжения."
RDT_WGN_SOLDIERS: "Трансфер в «Редут» - ваша альтернатива"
RDT_WGN_SOLDIERS_desc: "Мы готовы предоставить вагнерам лучшие условия контракта, чем сам Пригожин. Наше преимущество - полная легализация, возможность получить ветерана боевых действий, выплаты от государства, а также от нашей компании. Многие наемники работают за деньги, а не за идею. Так чем мы хуже, если готовы гарантировать большую зарплату и все необходимые выплаты?"
RDT_NEUTRAL: "Истинный нейтралитет"
RDT_NEUTRAL_desc: "Мы не должны участвовать в разборках двух псов, которые пытаются загрызть друг друга досмерти. Нам необходимо выступить орбитром и собрать все необходимые доказательства, указывающие на существование конфликта. Объективность позволит нам сделать необходимый, но серьезный шаг вперед, для победы нашей Родины."
RDT_CALL_PUTIN: "Личный звонок Путину"
RDT_CALL_PUTIN_desc: "Владимир Алексеев позвонил Путину по личному телефону, чтобы рассказать о ситуации между МО и ЧВК «Вагнер». Мы готовы предоставить все необходимые доказательства президенту."
RDT_WITH_WGN: "Встать на сторону ЧВК «Вагнер»"
RDT_WITH_WGN_desc: "Очевидно, что МО РФ пытается изолировать вагнеров от БК. Все это происходит из-за личного конфликта Шойгу и Пригожина. Если мы готовы на уступки перед МО РФ, то оркестр привык действовать иначе. Уход Суровикина и приход Герасимова окончательно сломал механизм работы между этими структурами. Мы начнем помогать музыкантам только для того, чтобы приблизить победу на Украине, а также, чтобы не допустить большого влияния МО РФ в будущем."
RDT_BK_FOR_WGN: "Предоставить некоторую часть БК"
RDT_BK_FOR_WGN_desc: "Мизинцев руководствовался правильными идеями, когда предоставил группе «Вагнера» часть боекомплекта. Ведь главное - победа России, а уже потом личные интересы. Каждый день у нас погибают сыны России, каждый день с СВО едет цинк на большую землю. Разве можно использовать боекомплект ради своей личной выгоды?"
#Ветка/к/Украине
RDT_DRG_21: "ДРГ 21-ого века"
RDT_DRG_21_desc: "Учебники МО СССР, ГРУ 1990-х годов значительно устарели, особенно для войны на Украине. Беспилотники, аэрокосмическая разведка, широкая интеграция ВСУ и НАТО привели нас к совершенствованию основопологающей доктрины. Теперь диверсионно-разведовательные операции адаптированы к реалиям новой эпохи, что позволяет нам наносить неожиданные удары для противника. В связке с ведущими умами мы дорабатываем отлаженный механизм диверсий."
RDT_RESERVS: "Стянуть резервы"
RDT_RESERVS_desc: "Наша дальнейшная задача - устроить прорыв приграничных пунктов ВСУ. Без необходимых резервов мы не сможем развить наш дальнеший успех. К сожалению, мы не всегда сможем надеяться на МО РФ, из-за этого нам придется взять данную иннициативу в свои руки."
RDT_AVANTURE: "Эпохальная авантюра"
RDT_AVANTURE_desc: "Мы должны выбрать направление нашей атаки, после чего наш штаб начнет планирование стратегической операции по взлому украинской границы. Наша задача из диверсионно-разведовательных проникновений начать оперативное пехотное, а после тактическое наступление в приграничье. Конечная цель - стратегический прорыв границы, что позволит не только создать буферную зону для России, но и приблизить конец СВО."
RDT_UKR_BORDERS: "Взломать границу"
RDT_UKR_BORDERS_desc: "Вот и настал момент истины, который, возможно, изменит положение на фронте. Остается только отдать приказ, товарищ Алексеев. "
RDT_PRETORIAN: "Преторианская гвардия России"
RDT_PRETORIAN_desc: "Пройдя долгий и тернистый путь, мы стали элитой российских войск. Для нас - долг и честь: быть героями своей страны."