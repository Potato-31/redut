l_russian:


#новости редута
super.14.t: "Оперативный прорыв границы"

redut.9000: "тест1000"
redut.9000.t: "ЧВК «Редут» информирует о пленении украинских погранцов"
redut.9000.d: "Пресс-служба ЧВК «Редут» проинформировала СМИ о широких акциях «внедрения» на приграничную территорию Украины. По заявлениям Владимира Алексеева, более тысячи украинских военных были пленены в Харьковской, Сумской и Черниговской областях. Сам же лидер ЧВК призвал сложить оружие солдатам ВСУ, как этого ранее требовал президент РФ Владимир Путин. Также, эксперты отмечают: активность ЧВК в приграничных районах запредельна. В ближайшее время возможны новые провокации, либо же, куда более значимые «акции» на территории самой Украины."
redut.9000.a: "..."

redut.9001: "тест1001"
redut.9001.t: "Беспорядочная стрельба на Украине"
redut.9001.d: "Украинские СМИ сообщают о беспорядочной стрельбе в приграничных ПГТ глубокой ночью. Военные, без опозновательных знаков, вели хаотичную стрельбу по жилым домам и блокпостам. После многочисленных провокаций неизвестные люди скрылись в лесных массивах. СБУ заявляет о плане перехвата. Украинские источники утверждают, что в военных преступлениях участвовали бойцы «Редута». «Уровень жестокости, самой ублюдочности был выше, чем в Буче. За эти военные преступления Россия ответит перед народной общественностью, перед всем цивилизованным миром. Мы не оставим данный инцидент нераскрытым», - заявляет офис президента Украины. Кадры с мест не вносят ясности о том, кто стоит за такой «акцией». Российские военкоры уже назвали данные сообщения ложью, провокацией нацеленной на обесчеловечивание ВС РФ. Пресс-служба ЧВК опровергла свою причастность к минувшим событиям. Как бы оно не было, все это - ад на земле."
redut.9001.a: "Без комментариев.."

redut.9004: "тест1001"
redut.9004.t: "Пожар на складах боеприпасов"
redut.9004.d: "Информация о возгорании на складах Вагнера начала появляться в сети совсем недавно, хотя данное событие невозможно было не заметить. Детонация боекомплекта вызвала широкий рокот на протяжении всех европейских регионах Российской Федерации, в том числе и в зоне СВО. МО информирует о незначительности «проишествия», что «не затронуло складские базы ВС РФ». Главная детонация произошла на территории краснодарского края, где пострадала от взрывов и база в Кубинке. Российские военкоры сходятся в том, что произошедшее - «диверсия ВСУ, что неприменно собирались ослабить данную ЧВК». Никаких официальных комментариев пресс-служба ЧВК «Вагнер» еще не предоставила."
redut.9004.a: "Главное, чтобы Колбасня не пострадала.." 

redut.9002: "тест1001"
redut.9002.t: "Госдума РФ приняла закон «о ЧВК»"
redut.9002.d: "Государственная Дума совсем недавно приняла закон «о ЧВК», что широко обсуждался еще в 2010-х годах. В новом законопроекте отсутствуют пункты о возможности осуществлять ЧВК торговлю оружием и вести «альтернативное урегулирование конфликтов». Такие пункты были в первоначальном варианте законопроекта о ЧВК, и именно они вызвали наибольшую критику среди специалистов. Но годы спустя роль ЧВК в современных реалиях поменялась. Как и в прошлом, иннициатором законопроекта стала фракция «Справедливая Россия - За правду». Законопроект приняли почти все депутаты, лишь 4 из них воздержались. Регулированием наемников займется ФСБ. ЧВК «Редут» стала первой в своем роде организацией, что официально стала признана государством. Дальнейшая судьба иных «организацией» покрыта мраком. Евгений Викторович никаких комментариев по этому поводу не давал."
redut.9002.a: "Реальность меняется"

redut.9003: "тест1004"
redut.9003.t: "Российские наемники были замечены в Киевской области"
redut.9003.d: "Сегодня вечером по сети начали ходить первые фотографии ЧВК «Редут» в Киевской области. Колонны данной «организации» остановились в н.п. Иванков, чтобы впоследствии продолжить движение в сторону Бородянка - Гостомель - Старые Петровцы. Как оказалось, ДРГ «Редута» находились в лесных массивах Киевской области незадолго до начала СВО. Украинские СМИ сходятся во мнении, что данные группы и разминировали ближайшее приграничье, чертили карту опорных пунктов, ПВД ВСУ. Аналитики отмечают, что наемники пытаются проникнуть в основную черту города, блокируя все очаги сопротивления по пути и продолжая свое движение в сторону Киевской агломерации. Владимир Зеленский сообщил о «сорванном покушении» на его жизнь, а также о задержании наемников «Редута» в попытке проникнуть в город."
redut.9003.a: "ЧВК кто-кто?.."

#гиркин редут
RDT.1: "тест2"
RDT.1.t: "Нежданная встреча.."
RDT.1.d: "После нашей широкой информационной компании, к нам в штаб пришел один не безывестный в широких кругах человек. Он почесывал свои поседевшие усы, держа в руках «черный» пропуск. Владимир Алексеев сидел в своем кабинете, продумывая дальнейшие операции. Однако, обычные дни нарушил бывший ополченец. Офицерский состав провел знатного гостя в штаб командования, где сидел глава ЧВК. Владимир сказал несколько слов. В кабинете остался только герой ДНР и герой России. Гиркин положил свой пропуск и протянул свою руку. Алексеев пожал ее. Мимолетное молчание прервалось речью Гиркина: «Я хочу служить у вас...»"
RDT.1.a: "«Игорь, теперь вы командир в наших рядах, но без политического будущего»."
RDT.1.b: "«Ваша связь с Ахметовым констатирует звание рядового, не более»."

RDT.2: "тест2"
RDT.2.t: "Судьба Клуба Рассерженных Патриотов"
RDT.2.d: "После прихода Гиркина в «организацию», многие сторонники КРП перестали вести активную политическую деятельность. Мы дошли до некоторых договоренностей с боевой частью Другой России Э.В. Лимонова. Новые интербригады будут собираться напрямую нами. Мы полностью будем фигурировать в новых договорах, полностью начнем участвовать в их обеспечении. Главное условие в нашем сотрудничестве - сокращение политических акций и демонстраций, на что нацболы согласились. Мы готовы предоставить вам лучшие условия, «Все для фронта, все для победы»."
RDT.2.a: "Интербригады станут основой для подразделений"
RDT.2.b: "Нацболы станут нашим мобилизационным резервом"

RDT.3: "тест2"
RDT.3.t: "Небольшая полемика"
RDT.3.d: "Игорь Стрелков обрушился с критикой нашего руководства. Он «не то что не брал денег Ахметова, а в принципе их не видел». «Михаил, вы проплаченная военизированная шавка, что только и делает, что воюет за деньги, мне с вами не по пути». После небольшой словестной перепалки Гиркин хлопнул дверью и ушел туда, откуда пришел."
RDT.3.a: "«Скатертью дорожка»."

RDT.4: "тест2"
RDT.4.t: "Наша позиция по ЧВК «Вагнер»"
RDT.4.d: "Славянский корпус стал основой перемен. Создание ЧВК «Вагнер» разрушило наше место под солнцем. Некогда наибольшее объединение под нашим чутким руководством сменилось тенью на фоне успехов «музыкантов». Но теперь мы полностью вернулись в игру. ЧВК «Редут» на данный момент - не просто ЧВК, а общественная организация. Наш голос учитывается не только в законодательной, исполнительной системе государства, но и в общественных суждениях. Специальная Военная Операция стала стартовым механизмом для многих начинаний, не только наших. Давний конфликт Сергея Кожугетовича и Евгения Викторовича перешел в активнейшую фазу. Вербовка заключенных группой Вагнера сменилась полной правительственной компетенцией. Количество выдаваемых боеприпасов данной ЧВК сокращается с каждым днем. Изнурительная мясорубка украинских частей превратилась в общий летаргический сон. Мы становимся свидетелями общей политической борьбы, что явно приведет к победу определенной стороны. С одной стороны мы должны помочь государству, ведь Вагнер - прямой конкурент для нас, но с другой стороны... Разве мы не станем следующей целью государства?.. МО РФ может посчитать, что наша объективная критика - помеха, которой не должно быть. А может и не посчитать, Владимир Алексеев. Мы никогда не знаем всей поднаготной..."
RDT.4.a: "Мы встанем на сторону МО РФ"
RDT.4.b: "Мы займем нейтральную позицию"
RDT.4.c: "Мы встанем на сторону оркестра"



#редут говняк
RDT.10: "тест1"
RDT.10.t: "Нынешняя действительность нашей ЧВК"
RDT.10.d: "ЧВК «Редут» - одна из самых древнейших частных военных компаний, которая берет свое начало еще в 2003-ем году. На данный момент можно констатировать период упадка Редута, так как за прошедшие несколько десятков лет мы не добились какой-то масштабной цели. Мы противостояли терроризму, участвовали в локальных операциях по всему миру, но мы никогда не участвовали в полномасштабной войне. За нашеми плечами большой военный опыт, что идет с афганской компании, а заканчивается операциями в Сирии. Наступил переломный момент нашей истории, когда мы вынуждены участвовать в общевойсковых операциях. Совместно с МО РФ наша ЧВК примет участие в специальной военной операции, которая начнется с минуты на минуту. Нам все еще неизвестен масштаб будущего конфликта, а также основное направление атаки, но как бы оно не было, нам необходимо привести войска в соответствующую боевую готовность."
RDT.10.a: "Ну что ж, поднажмём..."

RDT.11: "тест2"
RDT.11.t: "Оценка предстоящей операции"
RDT.11.d: "Наш генеральный штаб собрался ночью, чтобы обсудить проведение будущего «мероприятия». Данный «процесс» - красиво нарисованные стрелочки командованием повыше. Похоже, что данная война будет не маленькой и не победоносной. На нас ложится бремя тех, кто поможет выйти России из тяжелого положения. Наши бойцы пройдут через огонь и воду, через грезы и кошмары. Нам же, как командованию, остается одно: выбрать необходимую тактику для состава. Мы опробовали множество пехотных доктрин. Но только ваше решение, Владимир Алексеев, станет основой дальнейших действий."
RDT.11.a: "Только с помощью проламывающего удара мы достигнем своих целей."
RDT.11.b: "Акцент на планирование операций - залог успеха."
RDT.11.c: "Наша задача - прикрывать фланги ВС РФ в статической обороне."



RDT.12.t: "Проверка личного состава"
RDT.12.d: "Дневальный увидел загоревшуюся табличку, после чего доложил дежурному по роте. Один звонок, один кивок. -Рота, подъём, БОЕВАЯ ТРЕВОГА, БОЕВАЯ ТРЕВОГА, БОЕВАЯ ТРЕВОГА, БОЕВАЯ ТРЕВОГА. Началась неистовая суета, которая продолжалась еще несколько минут. Военная часть превратилась в крепость, где все были готовы к дальнейшим действиям. Владимир Алексеев приедет с минуты на минуту, для некого объявления. Офицеры с ужасом понимают, что все произошедшее - не тренировка, не проверка готовности в привычном плане. Это действительно тревога. Боевая."
RDT.12.a: "Жизнь нас ждет непростая..."

RDT.13.t: "Экстренный сбор высшего командования"
RDT.13.d: "Совет командиров «Редута» собрался в течение 3 часов. Круглый стол позволил быстро адаптироваться к столь необычайной обстановке. В голосе каждого была какая-то непонятная дрожь, но только Владимир Алексеев держал себя в руках. Его голос не только не дрогнул, так и четким монотонным басом орашал всю коллегию. Ежовые рукавицы генерала сохранили бескомпромиссность в будущих решениях. «Так оно и будет» - повторяли герои новой России, полностью осознавая свое положение. На своем пути мы не встретим цветов.."
RDT.13.a: "Жесткая воля - залог успеха."

RDT.14.t: "Нашим средствам связи пизда!"
RDT.14.d: "Оказалось, что ВС РФ не готовы к проведению стратегической операции в рамках средств связи. Мы почти полностью потеряли связь с центром, что уж говорить о связи с другими подразделениями, которые не входят в наше командование. Пока что только ТА-57 и ТА-88 работают без проблем. Дерипаска пообещал решить данный вопрос в кратчайшие сроки, увы, в ближайшие дни мы остаемся на месте.."
RDT.14.a: "Какой долбоеб купил дохуя китайских раций без ретрансляторов?!"

RDT.15.t: "Наши колонны покинули исходные позиции"
RDT.15.d: "Специальная Военная Операциия началась прямо сейчас. Наши колонны покинули исходные позиции и выдвинулись к поставленным целям. Пленум ЧВК «Редут» полностью будет содействовать ВС РФ для завершения конфликта. Владимир Алексеев, по нашим данным первая линия обороны Украины была проломлена. В течение нескольких суток нам прояснится вся ситуация на фронте, но пока что, мы можем констатировать факт крайне быстрого продвижения российских войск. Наши бойцы уже начинают штурм первых лесопосадок и укрепрайонов."
RDT.15.a: "Вперед, парни, за Родину!"

RDT.16.t: "ПСФСБ России"
RDT.16.d: "Наши операции в полной мере не могут быть проведены без информирования пограничной службы. Владимир Алексеев в полной мере позаботился об этом, поговорив с Владимиром Кулишовым и Александром Бортниковым. Теперь мы имеем карт-бланш на проход пограничной зоны, а наши «специалисты» не будут досматриваться ФСБ."
RDT.16.a: "Дорога открыта, товарищи"

RDT.17.t: "Заседание в генштабе ВС РФ"
RDT.17.d: "Камеры записывали открытое заседание, где участвовали ранее умалчиваемые лица. Владимир Алексеев и ряд генералов сидели напротив генштаба ВС РФ. Герасимов слушал доклад младших чинов, пока глава Редута готовился к своему выступлению на закрытом заседании. Выступление затронет обеспеченность солдат, старый офицерский состав, внедрение дронов, переход к сецентрической доктрине."
RDT.17.a: "С Редутом теперь считаются все"

RDT.18.t: "Игорь Иванович предлагает реорганизовать ЧВК «Редут»"
RDT.18.d: "Прошло совсем немного времени с того момента, когда бывший военный комендант Донецка влился в нашу структуру. Его военная фигура противоречива, но теперь он - неотъемлемая часть организации. В основе его плана реформ лежит сецентрическая война, строгая дисциплина, увеличение вылетов авиации, возвращение к глубокой обороне для сосредоточения большого количества сил. Идеи Гиркина были исписаны до мелочей, до такой скурпулезности, что некоторым генералам казалось тошным. Нельзя не отметить, что некоторые идеи нашли отклик в пленуме."
RDT.18.a: "Ваши идеи необходимы, Игорь Иванович"
RDT.18.b: "Мы не сможем начать реорганизацию, Игорь Иванович"

RDT.19.t: "Звонок в Кремль"
RDT.19.d: "Владимир Алексеев взял трубку телефона, что связывал его напрямую с ключевыми лицами государства. Позвонить можно было почти всем: председателю госдумы, председателю правительства, министру обороны и многим другим чинам. Небольшой гудок и Владимир Алексеев связался с президентом Российской Федерации. Краткое приветствие закончилось резким обозначением проблемы: «личной обиды двух видных деятелей России». Первое лицо России внимало то, что ему озвучивали, задавал уточняющие вопросы. На все вопросы глава «Редута» отвечал четко и внятно, представляя самую объективную картину происходящего. -Владимир Владимирович, я могу вам предоставить все необходимые документы во время личной встречи. У вас найдется время?"
RDT.19.a: "-Конечно, Владимир Алексеев"

RDT.20.t: "Реформы Гиркина дали свой результат"
RDT.20.d: "50 дней реформ не прошли даром, хоть мы и столкнулись со значительными трудностями в этот период. Теперь мы убрали множество былых недостатков в организации, излишней централизации, в дисциплине и идеологической составляющей. Теперь все наши сотрудники знают, что они сражаются не за денежную сумму, а за великую Россию. За семью, за своих детей, за родных и близких. Теперь ими движет не легкое желание наживы, а конкретная идея Родины. И за нее они готовы бороться до конца, до последней капли крови."
RDT.20.a: "Теперь мы готовы к выполнению дальнейших задач"
